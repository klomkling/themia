name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        # Skip integration tests on GitHub-hosted runners — they need
        # Testcontainers + DB image pulls (mcr.microsoft.com) that
        # intermittently 403 through Microsoft's WAF on shared runner IPs.
        # Integration coverage runs in integration.yml + locally before merge.
        run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=Integration"

  request-copilot-review:
    name: Request Copilot Review
    if: github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'ready_for_review'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request Copilot as reviewer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/pulls/${PR_NUMBER}/requested_reviewers" \
            -f "reviewers[]=copilot-pull-request-reviewer"
          status=$?
          if [ $status -ne 0 ]; then
            echo "::warning::Failed to request Copilot review. Ensure Copilot code review is enabled for this repository (Settings → Code & automation → Code review)."
          fi
          exit 0
