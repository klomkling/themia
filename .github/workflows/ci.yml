name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# themia is a PUBLIC repo — GitHub-hosted minutes are free and unlimited, so the optimisation target
# is PR WALL-CLOCK, not minutes. That inverts the usual advice: redundant parallel work is free, and
# the only thing worth cutting is the critical path (the slowest single job a PR waits on). So the
# build gate and the test shards run in parallel (each rebuilds — fine), and the tests are sharded to
# cut the tail. Integration (Testcontainers) tests run nightly in integration.yml, not here.
jobs:
  build:
    name: Build & inline review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # reviewdog needs base history to compute the PR diff

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Build (compile gate + inline diagnostics on the PR)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # The definitive "does the whole solution compile" gate — covers projects no test references —
        # AND the reviewdog inline-diagnostics pass, as ONE job that runs in PARALLEL with the test
        # shards (so reviewdog is off their critical path). Under TreatWarningsAsErrors any diagnostic
        # is emitted as `error` and fails the build; `set -o pipefail` + reviewdog's -fail-on-error=true
        # keep the fail-on-any-diagnostic gate while posting each diagnostic inline on the PR's lines.
        run: |
          set -o pipefail
          dotnet build --configuration Release --no-restore 2>&1 \
            | reviewdog \
                -efm='%f(%l\,%c): warning %m' \
                -efm='%f(%l\,%c): error %m' \
                -name=dotnet \
                -reporter=github-pr-review \
                -filter-mode=diff_context \
                -level=warning \
                -fail-on-error=true

  test:
    name: Test (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # one shard failing must not cancel the others (see all failures at once)
      matrix:
        shard: [1, 2, 3]
    env:
      SHARDS: "3"
      SHARD: ${{ matrix.shard }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Compose this shard's solution filter
        # Deterministic round-robin over the sorted test-project list: project i goes to shard
        # (i % SHARDS). Every project lands in exactly ONE shard, so the three shards together run the
        # exact same set the old single `dotnet test <solution>` did — this only PARTITIONS the test
        # set, it does not change which tests run. Fail loudly on an empty slice (a partition bug)
        # rather than pass vacuously.
        run: |
          set -euo pipefail
          mapfile -t ALL < <(find tests -name '*Tests.csproj' | sort)
          if [ ${#ALL[@]} -eq 0 ]; then
            echo "::error::Found 0 test projects — refusing a vacuous pass."
            exit 1
          fi
          SLICE=()
          for i in "${!ALL[@]}"; do
            if [ $(( i % SHARDS )) -eq $(( SHARD - 1 )) ]; then
              SLICE+=("${ALL[$i]}")
            fi
          done
          if [ ${#SLICE[@]} -eq 0 ]; then
            echo "::error::Shard ${SHARD}/${SHARDS} resolved 0 test projects — partition bug; refusing a vacuous pass."
            exit 1
          fi
          echo "Shard ${SHARD}/${SHARDS} → ${#SLICE[@]} of ${#ALL[@]} test projects:"
          printf '  %s\n' "${SLICE[@]}"
          {
            echo '{ "solution": { "path": "Themia.sln", "projects": ['
            for j in "${!SLICE[@]}"; do
              sep=,; [ "$j" -eq $(( ${#SLICE[@]} - 1 )) ] && sep=
              printf '    "%s"%s\n' "${SLICE[$j]}" "$sep"
            done
            echo '] } }'
          } > shard.slnf

      - name: Test shard
        # Same filter as the pre-shard single run — Integration (Testcontainers) tests are excluded
        # (their fixtures never init, so no Docker is needed here) and are covered nightly by
        # integration.yml. `dotnet test` restores + builds only this shard's slice.
        # --blame-hang-timeout turns a hung test host into a fast, named failure instead of a ~16-min
        # wait (unit tests here complete in ms, so 5m of inactivity is unambiguously a hang).
        run: dotnet test shard.slnf --configuration Release --verbosity normal --filter "Category!=Integration" --blame-hang-timeout 5m

  analyzer-flow:
    name: Analyzer flow (adopter smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Verify isolation analyzers flow to adopters
        # Packs the solution to a local feed, then builds a throwaway consumer of
        # Themia.Framework.Data.EFCore and asserts THEMIA104 fires — proving transitive analyzer flow,
        # the part most likely to silently break in a future packaging change.
        run: bash eng/verify-analyzer-flow.sh

  request-copilot-review:
    name: Request Copilot Review
    # Request a Copilot review on open/reopen/ready AND on every new push (synchronize), so each
    # commit is re-reviewed. Skip draft PRs — Copilot won't review drafts (avoids noise/warnings).
    if: >-
      github.event.pull_request.draft == false &&
      (github.event.action == 'opened' ||
       github.event.action == 'reopened' ||
       github.event.action == 'ready_for_review' ||
       github.event.action == 'synchronize')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request Copilot as reviewer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/pulls/${PR_NUMBER}/requested_reviewers" \
            -f "reviewers[]=copilot-pull-request-reviewer"
          status=$?
          if [ $status -ne 0 ]; then
            echo "::warning::Failed to request Copilot review. Ensure Copilot code review is enabled for this repository (Settings → Code & automation → Code review)."
          fi
          exit 0
