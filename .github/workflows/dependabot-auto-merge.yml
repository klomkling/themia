name: Dependabot Auto-Merge

# Enables GitHub *native* auto-merge on Dependabot PRs.
#
# The `@dependabot merge` / `@dependabot squash and merge` comment commands were
# DEPRECATED by GitHub on 2026-01-27 (no longer functional — only rebase/recreate
# remain), so the old "post a comment" approach does nothing. Native auto-merge is
# GitHub's recommended replacement: it merges the PR once ALL requirements pass.
#
# For Dependabot-authored PRs, Dependabot's entry in the default-branch ruleset
# bypass list applies to the auto-merge, so the Copilot-review requirement is
# skipped and a green CI is sufficient — verified on PR #8 (merged on CI pass
# despite the "Copilot review" ruleset, with only Dependabot in the bypass list).
#
# Requires the repo setting "Allow auto-merge" (enabled). pull_request_target is
# used only to obtain a writable token for Dependabot PRs; no PR code is checked out.

on:
  pull_request_target:
    # opened/reopened only — auto-merge persists across Dependabot's later pushes,
    # so there is no need to re-run on every `synchronize`.
    types: [opened, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Gate on the PR author (not github.actor — that is the human on a manual re-run).
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      - name: Enable native auto-merge (github-actions, or non-major)
        # Auto-merge all github-actions bumps (first-party, low risk) and any
        # non-major update. NuGet *major* bumps get no auto-merge — they stay open
        # for manual review. (Match both ecosystem spellings defensively.)
        if: >-
          steps.meta.outputs.package-ecosystem == 'github-actions' ||
          steps.meta.outputs.package-ecosystem == 'github_actions' ||
          steps.meta.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --auto --squash
